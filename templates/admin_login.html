{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block extra_styles %}
<style>
.login-wrap {
    min-height: calc(100vh - 65px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
}
.login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}
.login-icon {
    width: 64px;
    height: 64px;
    background: rgba(233,69,96,0.12);
    border: 1px solid rgba(233,69,96,0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 24px;
}
.login-card h2 {
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 6px;
}
.login-card .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
}
.error-msg {
    background: rgba(233,69,96,0.1);
    border: 1px solid rgba(233,69,96,0.3);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
}
.hint {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
}
</style>
{% endblock %}
{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <div class="login-icon">🔐</div>
        <h2>Admin Access</h2>
        <p class="subtitle">Enter your admin password to continue</p>
        {% if error %}
        <div class="error-msg">✕ {{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter admin password" autofocus required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:14px;">
                Unlock Admin Panel →
            </button>
        </form>
        <p class="hint">default: admin123</p>
    </div>
</div>
{% endblock %}
